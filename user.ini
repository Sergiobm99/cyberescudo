; CyberEscudo — PHP-FPM hardening (Plesk uses PHP-FPM, not mod_php)
; This file is auto-loaded by PHP-FPM for the httpdocs directory.

display_errors = Off
display_startup_errors = Off
log_errors = On
expose_php = Off

; Session hardening
session.cookie_httponly = 1
session.use_only_cookies = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax
session.cookie_secure = 1

; Disable dangerous functions (uncomment if your app doesn't need them)
; disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; File upload limits (adjust to your needs)
upload_max_filesize = 2M
post_max_size = 4M
max_execution_time = 30
memory_limit = 128M
