; CyberEscudo — PHP-FPM security settings (Plesk uses PHP-FPM by default)
; This file is auto-loaded by PHP-FPM. No Apache restart needed.

display_errors = Off
display_startup_errors = Off
log_errors = On
expose_php = Off
allow_url_include = Off
allow_url_fopen = Off

; Session hardening
session.cookie_httponly = 1
session.use_only_cookies = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax
; Set to 1 once HTTPS is active:
; session.cookie_secure = 1

; Disable dangerous functions (adjust if any are legitimately needed)
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,parse_ini_file,show_source,phpinfo
